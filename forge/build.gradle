plugins {
    id 'multiloader-loader'
    id 'net.neoforged.moddev.legacyforge'
}

mixin {
    add(sourceSets.main, "${mod_id}.refmap.json")
    config("${mod_id}.mixins.json")
}

legacyForge {
    version = "${minecraft_version}-${forge_version}"

    validateAccessTransformers = false

    accessTransformers = ["src/main/resources/META-INF/accesstransformer.cfg"]

    parchment {
        minecraftVersion = parchment_minecraft
        mappingsVersion = parchment_version
    }
    runs {
        client {
            client()
        }
        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
        server {
            server()
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

sourceSets.main.resources.srcDir 'src/generated/resources'

dependencies {
    compileOnly project(":common")
    jarJar implementation('net.neoforged:bus:8.0.2')
    additionalRuntimeClasspath('net.neoforged:bus:8.0.2')
    annotationProcessor("org.spongepowered:mixin:0.8.7:processor")
    modImplementation "maven.modrinth:jade:11.12.3+forge"
    modImplementation "maven.modrinth:oculus:1.20.1-1.8.0"
    modImplementation "maven.modrinth:embeddium:0.3.31+mc1.20.1"
    compileOnly("mezz.jei:jei-${minecraft_version}-forge-api:${jei_version}")
    modImplementation("mezz.jei:jei-${minecraft_version}-forge:${jei_version}")
}

jar {
    finalizedBy('reobfJar')
    manifest.attributes([
            "MixinConfigs": "${mod_id}.mixins.json"
    ])
}

javadocJar {
    destinationDirectory.set(project.layout.buildDirectory.dir("output"))
}

sourcesJar {
    destinationDirectory.set(project.layout.buildDirectory.dir("output"))
}

reobfJar {
    destinationDirectory.set(project.layout.buildDirectory.dir("output"))
}