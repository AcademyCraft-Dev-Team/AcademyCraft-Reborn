name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Dev and Release
        run: |
          ./gradlew build -PisDev=true
          ./gradlew build -PisDev=false

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: AcademyCraft
          path: 'build/libs/*.jar'