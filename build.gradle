plugins {
    id 'fabric-loom' version '1.10.1'
}

java {
    withSourcesJar()
}

loom {
    mixin {
        defaultRefmapName = "${project.mod_id}.refmap.json"
    }
    accessWidenerPath = file("src/main/resources/academy.accesswidener")
}

jar {
    version = project.mod_version
    archivesBaseName = project.archives_base_name
}

repositories {
    maven {
        name = "IzzelAliz Maven"
        url = "https://maven.izzel.io/releases/"
    }
    maven {
        name = "FelNull Maven"
        url = "https://maven.felnull.dev"
    }
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
    }
    maven {
        name = 'ParchmentMC'
        url = 'https://maven.parchmentmc.org'
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings loom.layered() {
        officialMojangMappings()
        parchment("org.parchmentmc.data:parchment-1.20.1:2023.09.03@zip")
    }
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    modImplementation("maven.modrinth:sodium:mc1.20.1-0.5.11")
    modImplementation("maven.modrinth:forge-config-api-port:v8.0.1-1.20.1-Fabric")

    modApi "icyllis.modernui:ModernUI-Core:3.11.1"
    modApi "icyllis.modernui:ModernUI-Markdown:3.11.1"
    modApi "icyllis.modernui:ModernUI-Fabric:${minecraft_version}-3.11.1.6"

    modApi "dev.felnull:special-model-loader:1.2.0"
}

processResources {
    inputs.property "version", project.version
    inputs.property "minecraft_version", project.minecraft_version
    inputs.property "loader_version", project.loader_version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version,
                "minecraft_version": project.minecraft_version,
                "loader_version": project.loader_version
    }
}
